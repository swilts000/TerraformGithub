name: AWS OIDC Test I
on:
  workflow_dispatch: # Allows you to run this manually from the "Actions" tab

permissions:
  id-token: write # Required for requesting the JWT
  contents: read  # Required for actions/checkout

jobs:
  test-ecr-permissions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::391119427586:role/GitHub_Actions_Access # Replace with your Role ARN
          aws-region: us-east-2 # Replace with your preferred region

      - name: Create Test ECR Repo
        id: create_repo
        run: |
          RESULT=$(aws ecr create-repository --repository-name oidc-test-repoii --output json)
          REPO_URL=$(echo $RESULT | jq -r '.repository.repositoryUri')
          echo "repo_url=$REPO_URL" >> $GITHUB_OUTPUT

      - name: List Repos (Verification)
        run: |
          aws ecr describe-repositories --repository-names oidc-test-repo

      - name: Count ECR Repos
        id: count_repos
        run: |
          COUNT=$(aws ecr describe-repositories --query 'length(repositories)' --output text)
          echo "repo_count=$COUNT" >> $GITHUB_OUTPUT
      
      - name: Print Outputs
        run: |
          echo "Repo URL: ${{ steps.create_repo.outputs.repo_url }}"
          echo "Total Repos: ${{ steps.count_repos.outputs.repo_count }}"   
      
          
      - name: Write Job Summary
        run: |
          echo "## ECR Results" >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Repo URL | ${{ steps.create_repo.outputs.repo_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Total Repos | ${{ steps.count_repos.outputs.repo_count }} |" >> $GITHUB_STEP_SUMMARY
          
      # - name: Delete Test ECR Repo
      #   if: always() # Ensures cleanup even if the creation or list steps fail
      #   run: |
      #     aws ecr delete-repository --repository-name oidc-test-repo --force
