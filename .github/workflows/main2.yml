name: AWS OIDC Test II
run-name: ${{ github.event.inputs.workflow_name || 'AWS OIDC Test II' }}

on:
  workflow_dispatch:
    inputs:
      ecr_name:
        description: 'ECR repository name'
        required: true
        default: 'repoforgithub'
        type: string
      action:
        description: 'Terraform action to run'
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::391119427586:role/GitHub_Actions_Access
          aws-region: us-east-2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        if: ${{ github.event.inputs.action == 'plan' }}
        run: terraform plan -var="ecr_name=${{ github.event.inputs.ecr_name }}"

      - name: Terraform Apply
        if: ${{ github.event.inputs.action == 'apply' }}
        run: terraform apply -auto-approve -var="ecr_name=${{ github.event.inputs.ecr_name }}"

      - name: Terraform Destroy
        if: ${{ github.event.inputs.action == 'destroy' }}
        run: terraform destroy -auto-approve -var="ecr_name=${{ github.event.inputs.ecr_name }}"